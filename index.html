
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>William Depestele · Business card</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 20px;
    }
    .card {
      max-width: 420px;
      background: white;
      padding: 24px;
      margin: auto;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
      text-align: center;
    }
    .logo {
      max-width: 200px;
      margin: 0 auto 20px;
      display: block;
    }
    h1 {
      margin-bottom: 6px;
    }
    a.button {
      display: block;
      margin-top: 20px;
      padding: 14px;
      background: #0071e3;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">

    <img src="logo.png" alt="Logo BRICQ" class="logo">

    <h1>William Depestele</h1>
    <p>Plant manager · BRICQ</p>

    <a class="button" href="contact.vcf">
      ➕ Add to my contacts
    </a>
  </div>
</body>
</html>
